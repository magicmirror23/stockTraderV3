bind 0.0.0.0
protected-mode yes
port 6379

# Persistence: keep enough durability for cache/session recovery.
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
save 900 1
save 300 10
save 60 10000

# Keep memory constrained for Always Free.
maxmemory 128mb
maxmemory-policy allkeys-lru

tcp-keepalive 60
timeout 0

global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: "api-gateway-health"
    metrics_path: /api/v1/health
    static_configs:
      - targets: ["api-gateway:8000"]

  - job_name: "admin-metrics"
    metrics_path: /api/v1/metrics
    static_configs:
      - targets: ["admin-backtest:8004"]

name: trading-platform

x-backend-common: &backend-common
  platform: linux/arm64
  build:
    context: ./src
    dockerfile: Dockerfile.oracle
  image: ${APP_IMAGE_NAME:-stocktrader-backend}:${IMAGE_TAG:-latest}
  restart: unless-stopped
  env_file:
    - .env.production
  environment:
    APP_ENV: ${APP_ENV:-production}
    LOG_LEVEL: ${LOG_LEVEL:-INFO}
    PYTHONUNBUFFERED: "1"
    DATABASE_URL: ${DATABASE_URL}
    REDIS_URL: ${REDIS_URL}
    MODEL_REGISTRY_DIR: ${MODEL_REGISTRY_DIR:-/opt/models}
    ACTIVE_MODEL_DIR: ${ACTIVE_MODEL_DIR:-}
    INFERENCE_ONLY: ${INFERENCE_ONLY:-true}
    ALLOW_PROD_RETRAIN: ${ALLOW_PROD_RETRAIN:-false}
    ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
  volumes:
    - ./models:/opt/models:ro
    - ./data/storage:/app/storage
  networks:
    - backend

services:
  reverse-proxy:
    platform: linux/arm64
    image: caddy:2.8-alpine
    container_name: trading-reverse-proxy
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      api-gateway:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:80/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - edge
      - backend
    mem_limit: 128m
    cpus: 0.25

  api-gateway:
    <<: *backend-common
    container_name: api-gateway
    environment:
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      MODEL_REGISTRY_DIR: ${MODEL_REGISTRY_DIR:-/opt/models}
      ACTIVE_MODEL_DIR: ${ACTIVE_MODEL_DIR:-}
      INFERENCE_ONLY: ${INFERENCE_ONLY:-true}
      ALLOW_PROD_RETRAIN: ${ALLOW_PROD_RETRAIN:-false}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      MARKET_DATA_URL: http://market-data:8001
      PREDICTION_URL: http://prediction:8002
      TRADING_URL: http://trading:8003
      RISK_URL: http://portfolio-risk:8005
      ADMIN_URL: http://admin-backtest:8004
    command: >
      gunicorn backend.api.services.gateway:app
      -k uvicorn.workers.UvicornWorker
      -w ${GATEWAY_WORKERS:-1}
      --bind 0.0.0.0:8000
      --timeout ${GATEWAY_TIMEOUT:-90}
      --graceful-timeout ${GATEWAY_GRACEFUL_TIMEOUT:-30}
      --keep-alive 10
      --access-logfile -
      --error-logfile -
      --max-requests 1000
      --max-requests-jitter 100
    depends_on:
      market-data:
        condition: service_healthy
      prediction:
        condition: service_healthy
      trading:
        condition: service_healthy
      portfolio-risk:
        condition: service_healthy
      admin-backtest:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=4)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 25s
    mem_limit: 256m
    cpus: 0.5

  market-data:
    <<: *backend-common
    container_name: market-data-service
    environment:
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      MODEL_REGISTRY_DIR: ${MODEL_REGISTRY_DIR:-/opt/models}
      INFERENCE_ONLY: ${INFERENCE_ONLY:-true}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      MARKET_DATA_BOOTSTRAP_DOWNLOAD: ${MARKET_DATA_BOOTSTRAP_DOWNLOAD:-false}
      MARKET_DATA_BACKGROUND_REFRESH_ENABLED: ${MARKET_DATA_BACKGROUND_REFRESH_ENABLED:-false}
      MDS_SCHEDULER_ENABLED: ${MDS_SCHEDULER_ENABLED:-true}
    command: >
      gunicorn backend.api.services.market_data:app
      -k uvicorn.workers.UvicornWorker
      -w ${MARKET_DATA_WORKERS:-1}
      --bind 0.0.0.0:8001
      --timeout ${MARKET_DATA_TIMEOUT:-120}
      --graceful-timeout 30
      --keep-alive 10
      --access-logfile -
      --error-logfile -
      --max-requests 800
      --max-requests-jitter 80
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/api/v1/health', timeout=4)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    mem_limit: 512m
    cpus: 1.0

  prediction:
    <<: *backend-common
    container_name: prediction-service
    command: >
      gunicorn backend.api.services.prediction:app
      -k uvicorn.workers.UvicornWorker
      -w ${PREDICTION_WORKERS:-1}
      --bind 0.0.0.0:8002
      --timeout ${PREDICTION_TIMEOUT:-120}
      --graceful-timeout 30
      --keep-alive 10
      --access-logfile -
      --error-logfile -
      --max-requests 600
      --max-requests-jitter 60
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/api/v1/health', timeout=4)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    mem_limit: 768m
    cpus: 1.0

  trading:
    <<: *backend-common
    container_name: trading-service
    command: >
      gunicorn backend.api.services.trading:app
      -k uvicorn.workers.UvicornWorker
      -w ${TRADING_WORKERS:-1}
      --bind 0.0.0.0:8003
      --timeout ${TRADING_TIMEOUT:-120}
      --graceful-timeout 30
      --keep-alive 10
      --access-logfile -
      --error-logfile -
      --max-requests 800
      --max-requests-jitter 80
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8003/api/v1/health', timeout=4)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    mem_limit: 512m
    cpus: 1.0

  portfolio-risk:
    <<: *backend-common
    container_name: portfolio-risk-service
    command: >
      gunicorn backend.api.services.portfolio_risk:app
      -k uvicorn.workers.UvicornWorker
      -w ${RISK_WORKERS:-1}
      --bind 0.0.0.0:8005
      --timeout ${RISK_TIMEOUT:-90}
      --graceful-timeout 30
      --keep-alive 10
      --access-logfile -
      --error-logfile -
      --max-requests 800
      --max-requests-jitter 80
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8005/api/v1/health', timeout=4)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    mem_limit: 384m
    cpus: 0.75

  admin-backtest:
    <<: *backend-common
    container_name: admin-backtest-service
    command: >
      gunicorn backend.api.services.admin_backtest:app
      -k uvicorn.workers.UvicornWorker
      -w ${ADMIN_WORKERS:-1}
      --bind 0.0.0.0:8004
      --timeout ${ADMIN_TIMEOUT:-180}
      --graceful-timeout 45
      --keep-alive 10
      --access-logfile -
      --error-logfile -
      --max-requests 400
      --max-requests-jitter 40
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8004/api/v1/health', timeout=4)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 35s
    mem_limit: 768m
    cpus: 1.0

  postgres:
    platform: linux/arm64
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    command: >
      postgres
      -c shared_buffers=${POSTGRES_SHARED_BUFFERS:-128MB}
      -c effective_cache_size=${POSTGRES_EFFECTIVE_CACHE_SIZE:-512MB}
      -c maintenance_work_mem=${POSTGRES_MAINTENANCE_WORK_MEM:-64MB}
      -c work_mem=${POSTGRES_WORK_MEM:-4MB}
      -c max_connections=${POSTGRES_MAX_CONNECTIONS:-80}
      -c wal_compression=on
      -c log_min_duration_statement=500
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 25s
    networks:
      - backend
    mem_limit: 512m
    cpus: 0.75

  redis:
    platform: linux/arm64
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 15s
    networks:
      - backend
    mem_limit: 128m
    cpus: 0.4

  rabbitmq:
    profiles: ["queue"]
    platform: linux/arm64
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-stocktrader}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-change-me}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/stocktrader}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 20s
      timeout: 8s
      retries: 5
      start_period: 20s
    networks:
      - backend
    mem_limit: 256m
    cpus: 0.5

  prometheus:
    profiles: ["monitoring"]
    platform: linux/arm64
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - backend
    mem_limit: 256m
    cpus: 0.5

  grafana:
    profiles: ["monitoring"]
    platform: linux/arm64
    image: grafana/grafana-oss:11.2.1
    container_name: grafana
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change-me}
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3000}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus
    networks:
      - backend
    mem_limit: 256m
    cpus: 0.5

networks:
  edge:
    driver: bridge
  backend:
    driver: bridge
    internal: true

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  caddy_data:
  caddy_config:
  prometheus_data:
  grafana_data:

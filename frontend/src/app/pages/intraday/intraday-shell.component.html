    <h1 class="intra__title"><i class="bi bi-lightning-charge-fill"></i> Intraday Trading</h1>
    <nav class="intra__tabs">
      <a class="intra__tab" routerLink="models" routerLinkActive="intra__tab--active">
        <i class="bi bi-cpu"></i> Models

      <a class="intra__tab" routerLink="options" routerLinkActive="intra__tab--active">
        <i class="bi bi-bar-chart-steps"></i> Options Signals

      <a class="intra__tab" routerLink="execution" routerLinkActive="intra__tab--active">

        <i class="bi bi-shield-check"></i> Trade Supervisor

  <div class="intra__content">

  # ── Admin & Backtest Service ─────────────────────────────────────
  - type: web
    name: stocktrader-admin-lyh3
    runtime: docker
    dockerfilePath: ./Dockerfile.render
    dockerCommand: >-
      gunicorn backend.api.services.admin_backtest:app
      -k uvicorn.workers.UvicornWorker
      -w 2 --bind 0.0.0.0:8000
      --timeout 600 --graceful-timeout 30 --access-logfile -
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: SERVICE_NAME

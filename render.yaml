# Render.com – Microservices deployment (frontend on Vercel)
#
# Architecture:
#   Gateway (public) → Market Data, Prediction, Trading, Admin (internal)
#   All services share one PostgreSQL database.
#
# `fromService` wiring below links gateway -> internal services automatically.
# Keep ALLOWED_ORIGINS set to your frontend URL(s).

services:
  # ── API Gateway (public entry point) ──────────────────────────────
  - type: web
    name: stocktrader-gateway-lyh3
    runtime: docker
    dockerfilePath: ./Dockerfile.render
    dockerCommand: >-
      gunicorn backend.api.services.gateway:app
      -k uvicorn.workers.UvicornWorker
      -w 2 --bind 0.0.0.0:8000
      --timeout 120 --graceful-timeout 30 --access-logfile -
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: SERVICE_NAME
        value: gateway
      - key: ALLOWED_ORIGINS
        value: "https://stockv3.vercel.app,http://localhost:3000,http://localhost:8000"
      - key: PAPER_MODE
        value: "true"
      - key: ANGEL_API_KEY
        value: tuI9emOo
      - key: ANGEL_CLIENT_ID
        value: AAAE305533
      - key: ANGEL_MPIN
        value: 1437
      - key: ANGEL_TOTP_SECRET
        value: WT6KB7AKHEREKSSJZQQK2HNC34
      - key: LOG_LEVEL
        value: INFO
      - key: MARKET_DATA_URL
        fromService:
          name: stocktrader-market-data-lyh3
          type: web
          property: hostport
      - key: PREDICTION_URL
        fromService:
          name: stocktrader-prediction-lyh3
          type: web
          property: hostport
      - key: TRADING_URL
        fromService:
          name: stocktrader-trading-lyh3
          type: web
          property: hostport
      - key: ADMIN_URL
        fromService:
          name: stocktrader-admin-lyh3
          type: web
          property: hostport
      - key: DATABASE_URL
        fromDatabase:
          name: stocktrader-db-lyh3
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
    healthCheckPath: /api/v1/health

  # ── Market Data Service (streaming, prices, WebSocket) ────────────
  - type: web
    name: stocktrader-market-data-lyh3
    runtime: docker
    dockerfilePath: ./Dockerfile.render
    dockerCommand: >-
      gunicorn backend.api.services.market_data:app
      -k uvicorn.workers.UvicornWorker
      -w 2 --bind 0.0.0.0:8000
      --timeout 120 --graceful-timeout 30 --access-logfile -
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: SERVICE_NAME
        value: market-data
      - key: ALLOWED_ORIGINS
        value: "https://stockv3.vercel.app,http://localhost:3000,http://localhost:8000"
      - key: ANGEL_API_KEY
        value: tuI9emOo
      - key: ANGEL_CLIENT_ID
        value: AAAE305533
      - key: ANGEL_MPIN
        value: 1437
      - key: ANGEL_TOTP_SECRET
        value: WT6KB7AKHEREKSSJZQQK2HNC34
      - key: DATABASE_URL
        fromDatabase:
          name: stocktrader-db-lyh3
          property: connectionString
      - key: PAPER_MODE
        value: "true"
      - key: MARKET_DATA_BOOTSTRAP_DOWNLOAD
        value: "false"
      - key: MARKET_DATA_BACKGROUND_REFRESH_ENABLED
        value: "false"
      - key: PRICE_FEED_AUTO_DOWNLOAD
        value: "false"
      - key: MARKET_DATA_BOOTSTRAP_LIMIT
        value: "12"
      - key: DATA_REFRESH_MAX_CONSEC_FAILS
        value: "5"
      - key: DATA_REFRESH_REQUEST_PAUSE_S
        value: "1.2"
      - key: DATA_REFRESH_FAIL_PAUSE_S
        value: "4.0"
      - key: YF_REQUESTS_PER_SECOND
        value: "0.2"
      - key: YF_MAX_RETRIES
        value: "2"
      - key: YF_SYMBOL_COOLDOWN_S
        value: "300"
      - key: YF_CIRCUIT_FAILURE_THRESHOLD
        value: "4"
      - key: YF_CIRCUIT_COOLDOWN_S
        value: "300"
      - key: YF_DOWNLOAD_MAX_RETRIES
        value: "2"
    healthCheckPath: /api/v1/health

  # ── Prediction / ML Service ──────────────────────────────────────
  - type: web
    name: stocktrader-prediction-lyh3
    runtime: docker
    dockerfilePath: ./Dockerfile.render
    dockerCommand: >-
      gunicorn backend.api.services.prediction:app
      -k uvicorn.workers.UvicornWorker
      -w 2 --bind 0.0.0.0:8000
      --timeout 300 --graceful-timeout 30 --access-logfile -
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: SERVICE_NAME
        value: prediction
      - key: ALLOWED_ORIGINS
        value: "https://stockv3.vercel.app,http://localhost:3000,http://localhost:8000"
      - key: SERVICE_PORT
        value: "8010"
      - key: DB_ECHO
        value: "false"
      - key: REDIS_URL
        value: ""
      - key: ANGEL_API_KEY
        value: ""
      - key: ANGEL_CLIENT_ID
        value: ""
      - key: ANGEL_MPIN
        value: ""
      - key: ANGEL_TOTP_SECRET
        value: ""
      - key: ANGEL_TOKEN_CACHE_PATH
        value: storage/runtime/angel_tokens.json
      - key: DATA_PROVIDER
        value: yahoo
      - key: NEWS_API_KEY
        value: ""
      - key: MODEL_ARTIFACTS_DIR
        value: storage/models
      - key: MODEL_SYNC_TOKEN
        value: stocktrader-sync-v1
      - key: TRAIN_LOOKBACK_DAYS
        value: "730"
      - key: TRAIN_VAL_RATIO
        value: "0.15"
      - key: TRAIN_TEST_RATIO
        value: "0.15"
      - key: TRAIN_EMBARGO_DAYS
        value: "5"
      - key: TRAIN_DEFAULT_MODEL
        value: lightgbm
      - key: TRAIN_MIN_DAYS
        value: "120"
      - key: VAL_MIN_DAYS
        value: "30"
      - key: TEST_MIN_DAYS
        value: "30"
      - key: MIN_UNIQUE_DATES
        value: "120"
      - key: TRAIN_ALLOW_REDUCED_VALIDATION
        value: "false"
      - key: TRAIN_DOWNLOAD_PROVIDER_RETRIES
        value: "2"
      - key: TRAIN_DOWNLOAD_OUTER_RETRIES
        value: "2"
      - key: TRAIN_DOWNLOAD_LOOKBACK_DAYS
        value: "1095"
      - key: TRAIN_DOWNLOAD_EXTENDED_LOOKBACK_DAYS
        value: "1825"
      - key: TRAIN_DOWNLOAD_MIN_RAW_ROWS
        value: "420"
      - key: TRAIN_DOWNLOAD_TARGET_SYMBOLS
        value: "8"
      - key: TRAIN_DOWNLOAD_REQUEST_PAUSE_S
        value: "1.0"
      - key: YF_REQUESTS_PER_SECOND
        value: "0.2"
      - key: YF_MAX_RETRIES
        value: "2"
      - key: YF_SYMBOL_COOLDOWN_S
        value: "300"
      - key: YF_CIRCUIT_FAILURE_THRESHOLD
        value: "4"
      - key: YF_CIRCUIT_COOLDOWN_S
        value: "300"
      - key: PREDICTION_CONFIDENCE_THRESHOLD
        value: "0.55"
      - key: STALE_TICK_SECONDS
        value: "300"
      - key: DATABASE_URL
        fromDatabase:
          name: stocktrader-db-lyh3
          property: connectionString
    healthCheckPath: /api/v1/health

  # ── Trading Service (execution, paper trading, bot) ──────────────
  - type: web
    name: stocktrader-trading-lyh3

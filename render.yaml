# Render.com – Microservices deployment (frontend on Vercel)
#
# Architecture:
#   Gateway (public) → Market Data, Prediction, Trading, Admin (internal)
#   All services share one PostgreSQL database.
#
# `fromService` wiring below links gateway -> internal services automatically.
# Keep ALLOWED_ORIGINS set to your frontend URL(s).

services:
  # ── API Gateway (public entry point) ──────────────────────────────
  - type: web
    name: stocktrader-gateway-lyh3
    runtime: docker
    dockerfilePath: ./Dockerfile.render
    dockerCommand: >-
      gunicorn backend.api.services.gateway:app
      -k uvicorn.workers.UvicornWorker
      -w 2 --bind 0.0.0.0:8000
      --timeout 120 --graceful-timeout 30 --access-logfile -
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: ALLOWED_ORIGINS
        value: "https://stockv3.vercel.app,http://localhost:3000,http://localhost:8000"
      - key: PAPER_MODE
        value: "true"
      - key: ANGEL_API_KEY
        value: tuI9emOo
      - key: ANGEL_CLIENT_ID
        value: AAAE305533
      - key: ANGEL_MPIN
        value: 1437
      - key: ANGEL_TOTP_SECRET
        value: WT6KB7AKHEREKSSJZQQK2HNC34
      - key: LOG_LEVEL
        value: INFO
      - key: MARKET_DATA_URL
        fromService:
          name: stocktrader-market-data-lyh3
          type: web
          property: hostport
      - key: PREDICTION_URL
        fromService:
          name: stocktrader-prediction-lyh3
          type: web
          property: hostport
      - key: TRADING_URL
        fromService:
          name: stocktrader-trading-lyh3
          type: web
          property: hostport
      - key: ADMIN_URL
        fromService:
          name: stocktrader-admin-lyh3
          type: web
          property: hostport
      - key: DATABASE_URL
        fromDatabase:
          name: stocktrader-db-lyh3
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
    healthCheckPath: /api/v1/health

  # ── Market Data Service (streaming, prices, WebSocket) ────────────
  - type: web
    name: stocktrader-market-data-lyh3
    runtime: docker
    dockerfilePath: ./Dockerfile.render
    dockerCommand: >-
      gunicorn backend.api.services.market_data:app
      -k uvicorn.workers.UvicornWorker
      -w 2 --bind 0.0.0.0:8000
      --timeout 120 --graceful-timeout 30 --access-logfile -
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: ALLOWED_ORIGINS
        value: "https://stockv3.vercel.app,http://localhost:3000,http://localhost:8000"
      - key: ANGEL_API_KEY
        value: tuI9emOo
      - key: ANGEL_CLIENT_ID
        value: AAAE305533
      - key: ANGEL_MPIN
        value: 1437
      - key: ANGEL_TOTP_SECRET
        value: WT6KB7AKHEREKSSJZQQK2HNC34
      - key: DATABASE_URL
        fromDatabase:
          name: stocktrader-db-lyh3
          property: connectionString
      - key: PAPER_MODE
        value: "true"
    healthCheckPath: /api/v1/health

  # ── Prediction / ML Service ──────────────────────────────────────
  - type: web
    name: stocktrader-prediction-lyh3
    runtime: docker
    dockerfilePath: ./Dockerfile.render
    dockerCommand: >-
      gunicorn backend.api.services.prediction:app
      -k uvicorn.workers.UvicornWorker
      -w 2 --bind 0.0.0.0:8000
      --timeout 300 --graceful-timeout 30 --access-logfile -
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: ALLOWED_ORIGINS
        value: "https://stockv3.vercel.app,http://localhost:3000,http://localhost:8000"
      - key: SERVICE_PORT
        value: "8010"
      - key: DB_ECHO
        value: "false"
      - key: REDIS_URL
        value: ""
      - key: ANGEL_API_KEY
        value: ""
      - key: ANGEL_CLIENT_ID
        value: ""
      - key: ANGEL_MPIN
        value: ""
      - key: ANGEL_TOTP_SECRET
        value: ""
      - key: ANGEL_TOKEN_CACHE_PATH
        value: storage/runtime/angel_tokens.json
      - key: DATA_PROVIDER
        value: yahoo
      - key: NEWS_API_KEY
        value: ""
      - key: MODEL_ARTIFACTS_DIR
        value: storage/models
      - key: TRAIN_LOOKBACK_DAYS
        value: "730"
      - key: TRAIN_VAL_RATIO
        value: "0.15"
      - key: TRAIN_TEST_RATIO
        value: "0.15"
      - key: TRAIN_EMBARGO_DAYS
        value: "5"
      - key: TRAIN_DEFAULT_MODEL
        value: lightgbm
      - key: PREDICTION_CONFIDENCE_THRESHOLD
        value: "0.55"
      - key: STALE_TICK_SECONDS
        value: "300"
      - key: DATABASE_URL
        fromDatabase:
          name: stocktrader-db-lyh3
          property: connectionString
    healthCheckPath: /api/v1/health

  # ── Trading Service (execution, paper trading, bot) ──────────────
  - type: web
    name: stocktrader-trading-lyh3
    runtime: docker
    dockerfilePath: ./Dockerfile.render
    dockerCommand: >-
      gunicorn backend.api.services.trading:app
      -k uvicorn.workers.UvicornWorker
      -w 2 --bind 0.0.0.0:8000
      --timeout 120 --graceful-timeout 30 --access-logfile -
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: ALLOWED_ORIGINS
        value: "https://stockv3.vercel.app,http://localhost:3000,http://localhost:8000"
      - key: ANGEL_API_KEY
        value: tuI9emOo
      - key: ANGEL_CLIENT_ID
        value: AAAE305533
      - key: ANGEL_MPIN
        value: 1437
      - key: ANGEL_TOTP_SECRET
        value: WT6KB7AKHEREKSSJZQQK2HNC34
      - key: DATABASE_URL
        fromDatabase:
          name: stocktrader-db-lyh3
          property: connectionString
      - key: PAPER_MODE
        value: "true"
    healthCheckPath: /api/v1/health

  # ── Admin & Backtest Service ─────────────────────────────────────
  - type: web
    name: stocktrader-admin-lyh3
    runtime: docker
    dockerfilePath: ./Dockerfile.render
    dockerCommand: >-
      gunicorn backend.api.services.admin_backtest:app
      -k uvicorn.workers.UvicornWorker
      -w 2 --bind 0.0.0.0:8000
      --timeout 600 --graceful-timeout 30 --access-logfile -
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: ALLOWED_ORIGINS
        value: "https://stockv3.vercel.app,http://localhost:3000,http://localhost:8000"
      - key: DATABASE_URL
        fromDatabase:
          name: stocktrader-db-lyh3
          property: connectionString
    healthCheckPath: /api/v1/health

databases:
  - name: stocktrader-db-lyh3
    plan: free
    databaseName: stocktrader
    user: stocktrader
